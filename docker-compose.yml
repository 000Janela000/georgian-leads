version: '3.8'

services:
  backend:
    build: .
    container_name: georgian-leads-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/leads.db
      - CLEARBIT_API_KEY=${CLEARBIT_API_KEY:-}
      - GOOGLE_CSE_API_KEY=${GOOGLE_CSE_API_KEY:-}
      - GOOGLE_CSE_CX=${GOOGLE_CSE_CX:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-}
      - META_WHATSAPP_TOKEN=${META_WHATSAPP_TOKEN:-}
      - META_WHATSAPP_PHONE_ID=${META_WHATSAPP_PHONE_ID:-}
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    networks:
      - georgian-leads-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: georgian-leads-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - georgian-leads-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  georgian-leads-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
