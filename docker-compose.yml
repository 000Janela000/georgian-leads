version: '3.8'

services:
  backend:
    build: .
    container_name: leadscout-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/leads.db
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    networks:
      - leadscout-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: leadscout-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - leadscout-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  leadscout-network:
    driver: bridge
